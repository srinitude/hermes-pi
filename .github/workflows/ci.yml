name: ci

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: jdx/mise-action@v2
      - name: Symlink in-Hermes skill path to checkout
        run: |
          mkdir -p "$HOME/.hermes/skills/autonomous-ai-agents"
          ln -snf "$GITHUB_WORKSPACE" "$HOME/.hermes/skills/autonomous-ai-agents/pi"
      - name: mise run setup
        run: mise run setup
      - name: mise run ci (push to main)
        if: github.event_name == 'push'
        run: mise run ci
        env:
          HERMES_PI_REPO: ${{ github.workspace }}
          HERMES_PI_CI: "1"
      - name: mise run lint + mise run test (pull request)
        if: github.event_name == 'pull_request'
        run: |
          mise run lint
          mise run test
        env:
          HERMES_PI_REPO: ${{ github.workspace }}
          HERMES_PI_CI: "1"
